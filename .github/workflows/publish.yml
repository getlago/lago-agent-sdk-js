name: publish

# Triggered when a v*.*.* tag is pushed. The tag's version must match the
# version in package.json — the workflow fails otherwise so you can't
# accidentally publish a mismatched build.
#
# One-time setup on npm:
#   https://docs.npmjs.com/trusted-publishers
#   Package:         @getlago/agent-sdk
#   GitHub Owner:    getlago
#   Repository:      lago-agent-sdk-js
#   Workflow file:   .github/workflows/publish.yml
#   Environment:     npm
#
# Also configure deployment protection on the `npm` GitHub environment
# (required reviewers + restrict to protected v*.*.* tags) — see RELEASING.md.
#
# After setup, releasing is one command from your laptop:
#   git tag v0.1.0 && git push --tags
#
# Third-party actions are pinned to full commit SHAs (not tags) so a hijacked
# or re-pointed tag can't inject code into a job that mints OIDC tokens. The
# trailing comment records the human-readable version each SHA corresponds to.

on:
  push:
    tags:
      - "v*.*.*"

# Least-privilege default for every job. Jobs that need more (OIDC, release
# creation) opt in explicitly below.
permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------
  # 1. Run the full CI gate first. If anything is red, abort before build.
  # ----------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test -- tests/unit
      - run: npm run build

  # ----------------------------------------------------------------------
  # 2. Build the package, assert tag matches package.json version, pack as
  #    tarball artifact so the publish step uses a verified, frozen bundle.
  # ----------------------------------------------------------------------
  build:
    name: build
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$TAG) != package.json version $PKG"
            exit 1
          fi
          echo "Tag $TAG matches package.json version $PKG"
      - name: Pack tarball
        run: npm pack
      - name: Upload tarball artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: package
          path: "*.tgz"
          if-no-files-found: error

  # ----------------------------------------------------------------------
  # 3. Publish to npm with provenance (supply-chain attestation).
  #    Uses OIDC — no NPM_TOKEN needed if trusted-publisher is configured.
  # ----------------------------------------------------------------------
  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for trusted publishing
      contents: read
    # Defense-in-depth: only ever publish from a v*.*.* tag ref, even if the
    # environment's protected-tag rule is removed or misconfigured in the UI.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: npm
      url: https://www.npmjs.com/package/@getlago/agent-sdk
    steps:
      # Node 24 bundles npm >= 11.13, which is required for OIDC trusted
      # publishing (npm CLI >= 11.5.1). Node 20/22 ship npm 10.x and would fail
      # the OIDC handshake at publish time. test/build stay on 20 deliberately —
      # they only pack the tarball, which is byte-identical regardless of npm.
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Download packed tarball
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: package
          path: package/
      # Publish the EXACT tarball the build job packed and verified — no checkout,
      # no `npm ci`, no rebuild. This guarantees the bytes on npm are identical to
      # the tested/version-checked bundle (and the GitHub Release asset), and keeps
      # all project/dependency code out of the job that holds id-token: write.
      # `--access public` is required for scoped packages on the first publish.
      # `--provenance` attaches a sigstore attestation tying the published
      # artifact to this workflow run — visible on the npm package page; the
      # attestation reads its source/commit/workflow from the GitHub OIDC token
      # and GITHUB_* env, so no git checkout is required.
      - run: npm publish package/*.tgz --provenance --access public

  # ----------------------------------------------------------------------
  # 4. Create a GitHub Release tied to the tag, attaching the tarball.
  # ----------------------------------------------------------------------
  release:
    name: github release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: package
          path: package/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            package/*.tgz
