name: publish

# Triggered when a v*.*.* tag is pushed. The tag's version must match the
# version in package.json — the workflow fails otherwise so you can't
# accidentally publish a mismatched build.
#
# One-time setup on npm:
#   https://docs.npmjs.com/trusted-publishers
#   Package:         lago-agent-sdk
#   GitHub Owner:    getlago
#   Repository:      lago-agent-sdk-js
#   Workflow file:   .github/workflows/publish.yml
#   Environment:     npm
#
# Also configure deployment protection on the `npm` GitHub environment
# (required reviewers + restrict to protected v*.*.* tags) — see RELEASING.md.
#
# After setup, releasing is one command from your laptop:
#   git tag v0.1.0 && git push --tags
#
# Third-party actions are pinned to full commit SHAs (not tags) so a hijacked
# or re-pointed tag can't inject code into a job that mints OIDC tokens. The
# trailing comment records the human-readable version each SHA corresponds to.

on:
  push:
    tags:
      - "v*.*.*"

# Least-privilege default for every job. Jobs that need more (OIDC, release
# creation) opt in explicitly below.
permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------
  # 1. Run the full CI gate first. If anything is red, abort before build.
  # ----------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test -- tests/unit
      - run: npm run build

  # ----------------------------------------------------------------------
  # 2. Build the package, assert tag matches package.json version, pack as
  #    tarball artifact so the publish step uses a verified, frozen bundle.
  # ----------------------------------------------------------------------
  build:
    name: build
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$TAG) != package.json version $PKG"
            exit 1
          fi
          echo "Tag $TAG matches package.json version $PKG"
      - name: Pack tarball
        run: npm pack
      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package
          path: "*.tgz"
          if-no-files-found: error

  # ----------------------------------------------------------------------
  # 3. Publish to npm with provenance (supply-chain attestation).
  #    Uses OIDC — no NPM_TOKEN needed if trusted-publisher is configured.
  # ----------------------------------------------------------------------
  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for trusted publishing
      contents: read
    # Defense-in-depth: only ever publish from a v*.*.* tag ref, even if the
    # environment's protected-tag rule is removed or misconfigured in the UI.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: npm
      url: https://www.npmjs.com/package/lago-agent-sdk
    steps:
      # npm provenance has no supported path for publishing a pre-packed tarball
      # — the attestation is bound to the build, so we must build from source in
      # this job and publish from the package directory (npm's documented flow).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Node 24 bundles npm >= 11.13, which is required for OIDC trusted
      # publishing (npm CLI >= 11.5.1). Node 20/22 ship npm 10.x and would fail
      # the OIDC handshake at publish time. test/build stay on 20 deliberately.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      # Build from source so provenance can be generated. `--access public`
      # keeps the (unscoped) package public. `--provenance` attaches a sigstore
      # attestation tying the published artifact to this exact workflow
      # run/commit — the "Built and signed on GitHub Actions" badge on npm.
      # The tag/version match was already enforced in the build job; this job
      # runs only on a v*.*.* tag (see the `if:` guard above), and reinstalls
      # from the committed lockfile so the build is reproducible.
      - run: npm publish --provenance --access public

  # ----------------------------------------------------------------------
  # 4. Create a GitHub Release tied to the tag, attaching the tarball.
  # ----------------------------------------------------------------------
  release:
    name: github release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package
          path: package/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            package/*.tgz
